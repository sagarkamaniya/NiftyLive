name: Android Build (NiftyLive)

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Fixes the Node.js 20 deprecation warning in GitHub Actions
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK with Error Logging
        # Added --info and --stacktrace to expose the hidden Kapt/Kotlin errors
        run: ./gradlew assembleDebug --no-daemon --info --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NiftyLive-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          
